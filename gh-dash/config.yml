# gh-dash config — tuned for Ma77Ball
# Docs: https://github.com/dlvhdr/gh-dash
# Edit sections (search "filters:") to change what each tab shows.

prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Assigned to Me
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
  - title: Drafts
    filters: is:open author:@me draft:true
  - title: Recently Merged
    filters: is:merged author:@me sort:updated-desc

issuesSections:
  - title: Assigned to Me
    filters: is:open assignee:@me
  - title: Created by Me
    filters: is:open author:@me
  - title: Mentioning Me
    filters: is:open mentions:@me

defaults:
  view: prs            # start on the PRs view (toggle with `s`)
  # Don't auto-scope to the repo you launched from — always show all repos.
  smartFilteringAtLaunch: false
  # Auto-refresh every section every 30 min so the dashboard stays live.
  refetchIntervalMinutes: 30
  preview:
    open: true
    width: 60
    position: auto     # right split on wide terminals, bottom split on narrow ones
  prsLimit: 20
  issuesLimit: 50

# Custom keybindings that run shell commands. Template vars:
#   {{.RepoName}} {{.RepoPath}} {{.PrNumber}} {{.IssueNumber}}
#   {{.HeadRefName}} {{.BaseRefName}} {{.Author}}
# Built-in keys still work (/ search, c comment, d diff, o open, a approve, p preview…).
keybindings:
  prs:
    # Check out this PR's branch into whatever clone ghme was launched from,
    # pulling it up to the latest remote commit when it can. If the local branch
    # has diverged (or the tree is dirty), ghme-checkout lands you on the local
    # branch instead and reports what's out of sync. The spacebar (gh-dash's
    # built-in checkout key) is rebound to the same helper. ghme-checkout reads
    # GHME_LAUNCH_DIR itself (NOT the {{.RepoPath}} template, which forces
    # gh-dash to resolve repoPaths and errors "local path to repo not specified"
    # when it can't); ghme always exports GHME_LAUNCH_DIR, so this never fails.
    # It also sets the terminal title to the branch, like the old binding.
    - key: C                       # check out this PR's branch + pull latest
      name: checkout
      command: ghme-checkout {{.PrNumber}} '{{.HeadRefName}}'
    - key: space                   # spacebar: same as C (checkout + pull latest)
      name: checkout
      command: ghme-checkout {{.PrNumber}} '{{.HeadRefName}}'
    # Single-PR update lives on gh-dash's built-in `u` ("update pr from base
    # branch"), which already runs `gh pr update-branch` (a merge, not a rebase)
    # with in-TUI progress — no custom binding needed for that.
    - key: U                       # update ALL your open PR branches at once (ignores selection)
      name: update-all
      # Same merge-not-rebase update as built-in `u`, looped over every open PR
      # you authored; prints an ok/conflict/failed line per PR. GH_PAGER=cat keeps
      # gh from piping the report into less inside the TUI's command runner.
      command: GH_PAGER=cat ghme update-all
    - key: R                       # retrigger CI: push an empty "re-run ci test" commit
      name: rerun-ci
      # Checks out the PR branch in GHME_LAUNCH_DIR (latest commit), then pushes an
      # empty commit so every workflow re-runs from scratch, handy when a check
      # flaked. Refuses to push from a diverged/dirty tree. See ghme-rerun-ci.
      command: ghme-rerun-ci {{.PrNumber}} '{{.HeadRefName}}'
    - key: v                       # full comment thread, rendered as readable cards
      name: comments
      command: ghme-comments pr {{.PrNumber}} {{.RepoName}}
    - key: y                       # copy PR url to the Wayland clipboard
      name: copy-url
      command: gh pr view {{.PrNumber}} --repo {{.RepoName}} --json url -q .url | wl-copy
  issues:
    - key: v                       # full comment thread, rendered as readable cards
      name: comments
      command: ghme-comments issue {{.IssueNumber}} {{.RepoName}}
    - key: y                       # copy issue url to the Wayland clipboard
      name: copy-url
      command: gh issue view {{.IssueNumber}} --repo {{.RepoName}} --json url -q .url | wl-copy

# No repoPaths mapping: the checkout keybinding uses GHME_LAUNCH_DIR (the folder
# ghme was launched from), so it works for any repo based on your current dir.

theme:
  ui:
    sectionsShowCount: true

pager:
  diff: less
